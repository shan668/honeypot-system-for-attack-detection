<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ project_name }} Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='90'>🛡️</text></svg>">
</head>
<body>
    <header class="topbar">
        <div class="brand">
            <span class="logo">🛡️</span>
            <div>
                <h1>{{ project_name }}</h1>
                <small>v{{ version }} &middot; Honeypot Intelligence Platform</small>
            </div>
        </div>
        <nav class="mainnav">
            <a href="{{ url_for('index') }}" class="{% if request.endpoint == 'index' %}active{% endif %}">Overview</a>
            <a href="{{ url_for('sessions_view') }}" class="{% if request.endpoint == 'sessions_view' %}active{% endif %}">Sessions</a>
            <a href="{{ url_for('credentials_view') }}" class="{% if request.endpoint == 'credentials_view' %}active{% endif %}">Credentials</a>
            <a href="{{ url_for('commands_view') }}" class="{% if request.endpoint == 'commands_view' %}active{% endif %}">Commands</a>
            <a href="{{ url_for('alerts_view') }}" class="{% if request.endpoint == 'alerts_view' %}active{% endif %}">Alerts</a>
            <a href="{{ url_for('analytics_view') }}" class="{% if request.endpoint == 'analytics_view' %}active{% endif %}">Analytics</a>
            <button class="btn btn-danger btn-nav" id="clear-data-btn" type="button">Clear Data</button>
        </nav>
    </header>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer>
        <span id="clear-data-status">&copy; {{ project_name }} &middot; Defensive honeypot research &middot; Auto-refresh {{ refresh_interval_ms }}ms</span>
    </footer>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>
    (function() {
        const button = document.getElementById('clear-data-btn');
        const status = document.getElementById('clear-data-status');
        if (!button) return;
        button.addEventListener('click', async () => {
            const ok = confirm('Clear all captured sessions, credentials, commands, alerts, HTTP/FTP/SSH events, statistics, and log files? This cannot be undone.');
            if (!ok) return;
            button.disabled = true;
            button.textContent = 'Clearing...';
            try {
                const resp = await fetch('/api/admin/clear', { method: 'POST' });
                const data = await resp.json();
                if (!resp.ok || !data.ok) throw new Error(data.error || 'Clear failed');
                const failedLogs = ((data.logs || {}).failed || []).length;
                status.textContent = failedLogs
                    ? `Captured data cleared. ${failedLogs} log file(s) could not be cleared while in use.`
                    : 'Captured data and log files cleared.';
                setTimeout(() => location.reload(), 900);
            } catch (err) {
                alert('Could not clear data: ' + err.message);
                button.disabled = false;
                button.textContent = 'Clear Data';
            }
        });
    })();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
